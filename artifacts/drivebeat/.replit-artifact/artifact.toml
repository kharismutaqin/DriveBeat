kind = "web"
previewPath = "/"
title = "DriveBeat"
version = "1.0.0"
id = "artifacts/drivebeat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19432

[services.development]
run = "pnpm --filter @workspace/drivebeat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drivebeat", "run", "build" ]
publicDir = "artifacts/drivebeat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19432"
BASE_PATH = "/"
